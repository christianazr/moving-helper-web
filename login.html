<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveMate Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-header">
        <span class="eyebrow">Welcome back</span>
        <h1>MoveMate</h1>
        <p>Sign in to manage your move from any device.</p>
      </div>

      <form id="auth-form" class="form-stack">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required />

        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />

        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <div class="auth-actions">
        <button id="signup-btn" type="button" class="btn btn-secondary btn-full">
          Create Account
        </button>
      </div>

      <p id="auth-message" class="auth-message"></p>

      <a href="index.html" class="back-link">← Back to Home</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("auth-form");
    const signupBtn = document.getElementById("signup-btn");
    const message = document.getElementById("auth-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const user = await signInWithPassword(email, password);

      if (user) {
        window.location.href = "index.html";
      } else {
        message.textContent = "Invalid email or password.";
      }
    });

    signupBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        message.textContent = "Enter your email and password first.";
        return;
      }

      const user = await signUpWithPassword(email, password);

      if (user) {
        message.textContent = "Account created successfully. You can now sign in.";
      }
    });
  </script>
</body>
</html>

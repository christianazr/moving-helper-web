<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveMate Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card" style="max-width: 420px; margin: 60px auto;">
      <h1>MoveMate</h1>
      <p>Sign in to access your moving planner.</p>

      <form id="auth-form" class="form-stack">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>

      <div style="margin-top: 12px; display: flex; gap: 10px;">
        <button id="signup-btn" type="button">Create Account</button>
      </div>

      <p id="auth-message" style="margin-top: 12px;"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("auth-form");
    const signupBtn = document.getElementById("signup-btn");
    const message = document.getElementById("auth-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const user = await signInWithPassword(email, password);
      if (user) {
        window.location.href = "index.html";
      } else {
        message.textContent = "Invalid email or password.";
      }
    });

    signupBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        message.textContent = "Enter email and password first.";
        return;
      }

      const user = await signUpWithPassword(email, password);
      if (user) {
        message.textContent = "Account created. Now sign in.";
      }
    });
  </script>
</body>
</html>

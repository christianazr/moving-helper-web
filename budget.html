<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moving Budget - MoveMate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card" style="margin-top: 40px;">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
  <div>
    <span class="eyebrow">MoveMate Workspace</span>
    <h1>Moving Budget</h1>
    <p>Add, complete, and manage your moving tasks.</p>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <a href="index.html" class="menu-btn" style="text-decoration:none;">Home</a>
    <button id="logout-btn" type="button">Log out</button>
  </div>
</div>

      <form id="budget-form" class="form-row">
        <input type="text" id="budget-name" placeholder="Expense name" required />
        <input type="number" id="budget-amount" placeholder="Amount" min="0" step="0.01" required />
        <button type="submit" id="budget-submit-btn">Add Expense</button>
      </form>

      <div class="total-row">
        <strong>Total:</strong>
        <span id="budget-total">£0.00</span>
      </div>

      <table class="inventory-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Expense</th>
            <th>Amount</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="budget-table-body"></tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="budget.js"></script>
</body>
</html>

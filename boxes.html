<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Inventory - MoveMate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container" style="padding: 36px 0 56px;">
    <section class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
        <div>
          <span class="eyebrow">MoveMate Workspace</span>
          <h1>Box Inventory</h1>
          <p>Add, edit, search, and organise every moving box in one place.</p>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <a href="index.html" class="menu-btn" style="text-decoration:none;">Home</a>
          <a href="checklist.html" class="menu-btn" style="text-decoration:none;">Checklist</a>
          <a href="budget.html" class="menu-btn" style="text-decoration:none;">Budget</a>
          <button id="logout-btn" type="button">Log out</button>
        </div>
      </div>

      <form id="box-form" class="form-stack">
        <input type="text" id="box-room" placeholder="Room (e.g. Kitchen)" required />
        <input type="text" id="box-items" placeholder="Contents (e.g. Plates, mugs)" required />

        <select id="box-status" required>
          <option value="Packed">Packed</option>
          <option value="Unpacked">Unpacked</option>
          <option value="Fragile">Fragile</option>
        </select>

        <button type="submit" id="box-submit-btn">Add Box</button>
      </form>

      <div class="filters-row">
        <input
          type="text"
          id="box-search"
          placeholder="Search by box number, room or contents..."
        />

        <select id="room-filter">
          <option value="all">All rooms</option>
        </select>
      </div>

      <table class="inventory-table">
        <thead>
          <tr>
            <th>Box #</th>
            <th>Room</th>
            <th>Contents</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="box-table-body"></tbody>
      </table>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="boxes.js"></script>
</body>
</html>
